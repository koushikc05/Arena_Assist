steps:
  # Build Docker image using bash entrypoint so each build-arg is properly quoted
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args:
      - '-c'
      - >-
        docker build
        --build-arg "VITE_FIREBASE_API_KEY=${_API_KEY}"
        --build-arg "VITE_FIREBASE_AUTH_DOMAIN=${_AUTH_DOMAIN}"
        --build-arg "VITE_FIREBASE_PROJECT_ID=${_PROJECT_ID}"
        --build-arg "VITE_FIREBASE_STORAGE_BUCKET=${_STORAGE_BUCKET}"
        --build-arg "VITE_FIREBASE_MESSAGING_SENDER_ID=${_SENDER_ID}"
        --build-arg "VITE_FIREBASE_APP_ID=${_APP_ID}"
        -t us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/arenaassist:latest
        .

  # Push image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/arenaassist:latest'

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'arenaassist'
      - '--image'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/arenaassist:latest'
      - '--region'
      - 'us-central1'
      - '--allow-unauthenticated'
      - '--quiet'

images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/arenaassist:latest'

substitutions:
  _API_KEY: ''
  _AUTH_DOMAIN: ''
  _PROJECT_ID: ''
  _STORAGE_BUCKET: ''
  _SENDER_ID: ''
  _APP_ID: ''
